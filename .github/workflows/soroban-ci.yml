name: Soroban CI

on:
  push:
    paths:
      - "eventhorizon-indexer/soroban-contracts/**"
      - ".github/workflows/soroban-ci.yml"
  pull_request:
    paths:
      - "eventhorizon-indexer/soroban-contracts/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventhorizon-indexer/soroban-contracts/eventhorizon_core

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build contract
        run: cargo build --target wasm32-unknown-unknown --release
